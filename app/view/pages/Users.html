{% extends "layouts/main.html" %}

{% block title %}Novo Usuário{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2>Cadastro de Usuário</h2>
    </div>
</div>

<form id="form">
    <input type="hidden" id="id" name="id">
    <input type="hidden" id="action" name="action">

    <!-- Nome + Email -->
    <div class="row">
        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="nome" name="nome" placeholder="Nome">
                <label>Nome</label>
            </div>
        </div>

        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="Email">
                <label>E-mail</label>
            </div>
        </div>
    </div>

    <!-- Senha -->
    <div class="row">
        <div class="col-12">
            <div class="input-group mb-3">
                <div class="form-floating flex-grow-1">
                    <input type="password" class="form-control" id="senha" name="senha" placeholder="Senha">
                    <label>Senha</label>
                </div>
                <button class="btn btn-outline-secondary" type="button" id="toggleSenha">
                    👁
                </button>
            </div>
        </div>
    </div>

    <!-- Sexo + Idade -->
    <div class="row">
        <div class="col-6">
            <div class="form-floating mb-3">
                <select class="form-select" id="sexo" name="sexo">
                    <option value="">Selecione</option>
                    <option value="M">Masculino</option>
                    <option value="F">Feminino</option>
                    <option value="Outro">Outro</option>
                </select>
                <label>Sexo</label>
            </div>
        </div>

        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="number" class="form-control" id="idade" name="idade">
                <label>Idade</label>
            </div>
        </div>
    </div>

    <!-- Altura + Peso -->
    <div class="row">
        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="number" step="0.01" class="form-control" id="altura" name="altura">
                <label>Altura (m)</label>
            </div>
        </div>

        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="number" step="0.01" class="form-control" id="peso" name="peso">
                <label>Peso (kg)</label>
            </div>
        </div>
    </div>

    <!-- OBJETIVO -->
    <div class="row">
        <div class="col-12">
            <div class="form-floating mb-3">
                <select class="form-select" id="objetivo" name="objetivo">
                    <option value="">Selecione um objetivo</option>
                    <option value="Emagrecer">Emagrecer</option>
                    <option value="Ganhar Massa">Ganhar Massa</option>
                    <option value="Definir Corpo">Definir Corpo</option>
                    <option value="Manter Peso">Manter Peso</option>
                </select>
                <label>Objetivo</label>
            </div>
        </div>
    </div>

    <!-- IMC -->
    <div class="row">
        <div class="col-12">
            <div class="alert alert-info">
                IMC: <strong id="imc">0.00</strong>
            </div>
        </div>
    </div>

    <!-- Botão -->
    <div class="row">
        <div class="col-12">
            <button type="button" class="btn btn-success" id="insert">
                Salvar
            </button>
        </div>
    </div>

</form>

{% endblock %}

{% block scripts %}
<script src="file:///{{ assets }}/js/users.js"></script>
{% endblock %}
