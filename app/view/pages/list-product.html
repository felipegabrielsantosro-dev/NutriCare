{% extends "layouts/main.html" %}

{% block title %}Produtos{% endblock %}

{% block content %}
<h2>Lista de Produtos</h2>

<div class="row">
    <div class="col-12 mb-2">
        <button class="btn btn-success"
            onclick="api.window.openModal('pages/product', { width: 900, height: 600, title: 'Cadastrar Produto' })">
            <i class="fa-solid fa-plus"></i>
            Novo produto
        </button>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <table id="table-products" class="table table-striped table-hover table-bordered" style="width: 100%;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Alimento / Produto</th>
                    <th>Refeição</th>
                    <th>Preço Compra</th>
                    <th>Preço Venda</th>
                    <th>Margem (%)</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script defer type="module" src="file:///{{ assets }}/js/list-product.js"></script>
{% endblock %}
